name: guoqi-job-hunter daily monitor

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  daily-monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guoqi-job-hunter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml openpyxl

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: guoqi-job-hunter/data
          key: guoqi-job-hunter-seen-jobs-${{ github.run_id }}
          restore-keys: |
            guoqi-job-hunter-seen-jobs-

      - name: Run daily monitor and email digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MIN_NOTIFY_SCORE: "60"
          SEND_EMPTY_DIGEST: "true"
        run: python src/daily_digest.py

      - name: Upload monitor output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guoqi-job-hunter-output
          path: |
            guoqi-job-hunter/output
            guoqi-job-hunter/data
